name: Auto-merge Exercism PRs
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-approve and merge Exercism PRs
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            // Only target PRs from Exercism
            if (pr.user.login === 'exercism') {

              console.log(`Approving PR #${pr.number} from Exercism...`);

              // Approve PR
              await github.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                event: 'APPROVE'
              });

              console.log(`Merging PR #${pr.number}...`);

              // Merge PR (squash or merge)
              await github.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash' // change to 'merge' if you want regular merge
              });

              // Delete branch if it's in your repo
              if (pr.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`) {
                console.log(`Deleting branch ${pr.head.ref}...`);
                await github.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${pr.head.ref}`
                });
              }
            } else {
              console.log(`PR #${pr.number} is not from Exercism. Skipping.`);
            }
